name: Update profile widgets

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate trophy
        run: |
          mkdir -p profile

          fetch_trophy() {
            local url="$1"
            local destination="$2"
            local temp_file
            temp_file="$(mktemp)"

            if curl -fsSL "$url" -o "$temp_file" && grep -q "<svg" "$temp_file"; then
              mv "$temp_file" "$destination"
              echo "Updated $destination"
            else
              rm -f "$temp_file"
              echo "Skipping $destination because the trophy source is unavailable."
            fi
          }

          fetch_trophy \
            "https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&row=1&margin-w=40" \
            "profile/trophy.svg"
          fetch_trophy \
            "https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&theme=onedark&row=1&margin-w=40" \
            "profile/trophy-dark.svg"

      - name: Generate stats cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          UTC_OFFSET: 3
          EXCLUDE: "Jupyter Notebook"
          AUTO_PUSH: false

      - name: Extract cards
        run: |
          mkdir -p profile
          cp "profile-summary-card-output/github/1-repos-per-language.svg" "profile/top-langs.svg"
          cp "profile-summary-card-output/github_dark/1-repos-per-language.svg" "profile/top-langs-dark.svg"
          rm -rf profile-summary-card-output

      - name: Ensure widgets token is configured
        env:
          WIDGETS_TOKEN: ${{ secrets.WIDGETS_TOKEN }}
        run: |
          if [ -z "$WIDGETS_TOKEN" ]; then
            echo "WIDGETS_TOKEN secret is required for line badges that include private repositories." >&2
            exit 1
          fi

      - name: Generate line badges
        env:
          GITHUB_TOKEN: ${{ secrets.WIDGETS_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}
          OUTPUT_DIR: profile
        run: python3 scripts/generate_line_badges.py

      - name: Generate activity overview
        env:
          GITHUB_TOKEN: ${{ secrets.WIDGETS_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}
          OUTPUT_DIR: profile
          UTC_OFFSET: 3
          ACTIVITY_DAYS: 14
        run: python3 scripts/generate_activity_overview.py

      - name: Generate profile stats
        env:
          GITHUB_TOKEN: ${{ secrets.WIDGETS_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}
          OUTPUT_DIR: profile
        run: python3 scripts/generate_profile_stats.py

      - name: Commit and push
        run: |
          git config user.name "lReDragol"
          git config user.email "blinov.dr1@yandex.ru"

          git add \
            profile/activity-dark.svg \
            profile/lines-7d.svg \
            profile/lines-30d.svg \
            profile/stats.svg \
            profile/stats-dark.svg \
            profile/top-langs.svg \
            profile/top-langs-dark.svg \
            profile/trophy.svg \
            profile/trophy-dark.svg
          git commit -m "chore: update profile widgets" || exit 0
          git push
