<svg xmlns="http://www.w3.org/2000/svg" width="340" height="200" viewBox="0 0 340 200" role="img" aria-label="GitHub profile stats">
  <style>* {
          font-family: 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif
        }</style>
  <rect x="1" y="1" rx="10" ry="10" height="198" width="338" stroke="#30363d" stroke-width="1" fill="#0d1117" stroke-opacity="1"></rect>
  <text x="24" y="38" style="font-size: 22px; fill: #2f81f7; font-weight: 700;">Stats</text>
  <text x="24" y="58" style="font-size: 12px; fill: #8b949e;">Includes private repos available to the token</text>
  <line x1="24" y1="72" x2="316" y2="72" stroke="#21262d" stroke-width="1"/>
  <circle cx="31" cy="89" r="4" fill="#3fb950"/>
  <text x="44" y="94" style="fill: #8b949e; font-size: 14px;">Total Stars</text>
  <text x="306" y="94" text-anchor="end" style="fill: #f0f6fc; font-size: 14px; font-weight: 700;">42</text>
  <circle cx="31" cy="113" r="4" fill="#3fb950"/>
  <text x="44" y="118" style="fill: #8b949e; font-size: 14px;">Total Commits</text>
  <text x="306" y="118" text-anchor="end" style="fill: #f0f6fc; font-size: 14px; font-weight: 700;">266</text>
  <circle cx="31" cy="137" r="4" fill="#3fb950"/>
  <text x="44" y="142" style="fill: #8b949e; font-size: 14px;">Total PRs</text>
  <text x="306" y="142" text-anchor="end" style="fill: #f0f6fc; font-size: 14px; font-weight: 700;">1</text>
  <circle cx="31" cy="161" r="4" fill="#3fb950"/>
  <text x="44" y="166" style="fill: #8b949e; font-size: 14px;">Total Issues</text>
  <text x="306" y="166" text-anchor="end" style="fill: #f0f6fc; font-size: 14px; font-weight: 700;">1</text>
  <circle cx="31" cy="185" r="4" fill="#3fb950"/>
  <text x="44" y="190" style="fill: #8b949e; font-size: 14px;">Contributed to</text>
  <text x="306" y="190" text-anchor="end" style="fill: #f0f6fc; font-size: 14px; font-weight: 700;">33</text>
</svg>
